# Supply-chain security baseline (see DevilTea/hub templates/pnpm-security.md)
minimumReleaseAge: 4320
minimumReleaseAgeExclude:
  - '@deviltea/eslint-config'
  - '@deviltea/tsconfig'
shellEmulator: true

trustPolicy: no-downgrade
packages:
  - docs
  - 'packages/*'

catalog:
  '@clack/prompts': ^0.10.1
  '@deviltea/eslint-config': 8.0.2
  '@deviltea/tsconfig': 0.0.10
  '@shikijs/vitepress-twoslash': ^3.23.0
  '@types/node': ^24.13.2
  '@vitest/coverage-v8': ^4.1.9
  bumpp: ^11.1.0
  eslint: ^9.39.4
  lint-staged: ^15.5.2
  pathe: ^2.0.3
  pkg-size: ^2.4.0
  publint: ^0.3.21
  rimraf: ^6.1.3
  simple-git-hooks: ^2.13.1
  tsx: ^4.22.5
  typescript: ^5.9.3
  unbuild: ^3.6.1
  vite: ^7.3.6
  vitepress: 2.0.0-alpha.17
  vitepress-plugin-group-icons: ^1.7.5
  vitest: ^4.1.9
  vue: ^3.5.39
  vue-tsc: ^2.2.12
  zx: ^8.8.5

blockExoticSubdeps: true
strictDepBuilds: true
ignoredBuiltDependencies:
  - esbuild
  - simple-git-hooks
onlyBuiltDependencies: []
