name: Release

permissions:
  id-token: write # npm trusted publishing (OIDC)
  contents: write # bumpp pushes the version commit + tag; changelogithub creates the GitHub release

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: Type of version bump
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: setup node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'

      - name: install dependencies
        run: pnpm install --frozen-lockfile

      - name: validate
        run: pnpm build && pnpm publint && pnpm typecheck && pnpm test

      - name: bump version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          pnpm exec bumpp -r ${{ github.event.inputs.bump_type }} -y

      - name: publish (npm trusted publishing)
        run: pnpm build && pnpm publish:packages

      - name: generate release notes
        run: npx changelogithub
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
